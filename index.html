<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ситуаційний центр: Карта повітряних загроз</title>
    <style>
        :root {
            --bg-dark: #090d16;
            --panel-bg: #111827;
            --border-color: #1f2937;
            --danger-high: #ef4444;
            --danger-mid: #f59e0b;
            --danger-low: #10b981;
            --text-light: #f9fafb;
            --text-muted: #6b7280;
            --font-mono: 'Courier New', Courier, monospace;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
        body { background-color: var(--bg-dark); color: var(--text-light); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        header { background-color: var(--panel-bg); border-bottom: 1px solid var(--border-color); padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; }
        .logo-area h1 { font-size: 1.4rem; text-transform: uppercase; color: var(--danger-high); }
        .logo-area p { font-size: 0.8rem; color: var(--text-muted); font-family: var(--font-mono); }
        
        .main-container { display: flex; flex: 1; overflow: hidden; }
        .sidebar { width: 360px; background-color: var(--panel-bg); border-right: 1px solid var(--border-color); display: flex; flex-direction: column; padding: 20px; gap: 15px; }
        
        .status-box { background: rgba(255,255,255,0.02); padding: 15px; border-radius: 8px; border-left: 4px solid var(--danger-low); }
        .status-box.high { border-left-color: var(--danger-high); background: rgba(239, 68, 68, 0.05); }
        .status-box.mid { border-left-color: var(--danger-mid); background: rgba(245, 158, 11, 0.05); }
        .status-box h3 { margin-bottom: 8px; font-size: 1.1rem; }
        .status-box p { font-size: 0.9rem; color: #cbd5e1; line-height: 1.4; }
        
        /* Кнопки пульта управления прямо на сайте */
        .admin-panel { background: rgba(255,255,255,0.01); border: 1px solid var(--border-color); padding: 15px; border-radius: 8px; display: flex; flex-direction: column; gap: 10px; }
        .admin-panel h4 { font-size: 0.85rem; color: var(--text-muted); text-transform: uppercase; margin-bottom: 5px; }
        .btn { background: #1f2937; border: 1px solid #374151; color: var(--text-light); padding: 10px; border-radius: 6px; cursor: pointer; font-weight: bold; text-align: left; transition: background 0.2s; }
        .btn:hover { background: #374151; }
        .btn.danger { border-color: var(--danger-high); color: var(--danger-high); }
        .btn.warning { border-color: var(--danger-mid); color: var(--danger-mid); }
        .btn.success { border-color: var(--danger-low); color: var(--danger-low); }

        .map-area { flex: 1; position: relative; background-color: #0d131f; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .radar-grid { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-image: linear-gradient(rgba(31, 41, 55, 0.15) 1px, transparent 1px), linear-gradient(90deg, rgba(31, 41, 55, 0.15) 1px, transparent 1px); background-size: 40px 40px; pointer-events: none; }
        .map-visualization { width: 95%; height: 85%; border: 1px dashed rgba(107, 114, 128, 0.3); border-radius: 8px; position: relative; background: radial-gradient(circle, rgba(17,24,39,0.6) 0%, rgba(9,13,22,0.9) 100%); display: flex; align-items: center; justify-content: center; }
        
        .map-target { position: absolute; display: flex; flex-direction: column; align-items: center; transform: translate(-50%, -50%); }
        .target-blip { width: 14px; height: 14px; border-radius: 50%; background-color: var(--danger-high); box-shadow: 0 0 12px var(--danger-high); position: relative; }
        .target-blip::after { content: ''; position: absolute; top: -10px; left: -10px; width: 32px; height: 32px; border: 1px solid var(--danger-high); border-radius: 50%; animation: pulse 2s infinite ease-out; opacity: 0; }
        @keyframes pulse { 0% { transform: scale(0.3); opacity: 1; } 100% { transform: scale(1.5); opacity: 0; } }
        .target-label { background-color: rgba(9, 13, 22, 0.95); border: 1px solid var(--border-color); padding: 4px 8px; border-radius: 4px; font-size: 0.75rem; font-family: var(--font-mono); margin-top: 6px; white-space: nowrap; color: var(--danger-high); }
    </style>
</head>
<body>
    <header>
        <div class="logo-area">
            <h1>Система моніторингу «ЗАГРОЗА»</h1>
            <p>GitHub Web-Версія</p>
        </div>
    </header>

    <div class="main-container">
        <aside class="sidebar">
            <div class="admin-panel">
                <h4>Пульт керування картою</h4>
                <button class="btn danger" onclick="setStatus('drone')">🛸 Пуск Шахедів</button>
                <button class="btn danger" onclick="setStatus('missile')">🚀 Ракетна небезпека</button>
                <button class="btn warning" onclick="setStatus('mig')">🦊 Зліт МіГ-31К</button>
                <button class="btn success" onclick="setStatus('clear')">🟢 ВІДБІЙ / Чисто</button>
            </div>

            <h2 style="font-size: 0.9rem; text-transform: uppercase; color: var(--text-muted);">Поточний статус</h2>
            <div id="status-container" class="status-box low">
                <h3 id="status-title">ПОВІТРЯНИЙ ПРОСТІР ЧИСТИЙ</h3>
                <p id="status-desc">Активних загроз (Ракет / БПЛА) в небі не виявлено. Дякуємо силам ППО.</p>
            </div>
        </aside>

        <main class="map-area">
            <div class="radar-grid"></div>
            <div class="map-visualization" id="map-visual">
                <div style="position: absolute; width: 60%; height: 80%; border: 1px dashed rgba(245, 158, 11, 0.15); border-radius: 50%;"></div>
            </div>
        </main>
    </div>

    <script>
        // Логика переключения статусов прямо в браузере без Python
        function setStatus(type) {
            const statusBox = document.getElementById('status-container');
            const title = document.getElementById('status-title');
            const desc = document.getElementById('status-desc');
            const mapVisual = document.getElementById('map-visual');
            
            // Удаляем старые цели
            const targets = mapVisual.getElementsByClassName('map-target');
            while(targets.length > 0) { targets[0].remove(); }

            if (type === 'drone') {
                statusBox.className = "status-box high";
                title.innerText = "🔴 АКТИВНА АТАКA БПЛА";
                desc.innerText = "Зафіксовано рух ударних дронів типу «Шахед» через північні області.";
                createTarget("35%", "45%", "MTR-1042 (БПЛА Шахед)");
            } else if (type === 'missile') {
                statusBox.className = "status-box high";
                title.innerText = "🚨 КРИТИЧНА РАКЕТНА НЕБЕЗПЕКА";
                desc.innerText = "Масовані пуски крилатих/балістичних ракет. Залишайтеся в безпечних місцях!";
                createTarget("55%", "65%", "MSL-903 (Крилаті ракети)");
            } else if (type === 'mig') {
                statusBox.className = "status-box mid";
                title.innerText = "🟡 ЗАГРОЗА КИНДЖАЛІВ (МіГ-31К)";
                desc.innerText = "В повітрі знаходиться носій гіперзвукових ракет Кинджал. Тривога по всій країні.";
            } else if (type === 'clear') {
                statusBox.className = "status-box low";
                title.innerText = "🟢 ПОВІТРЯНИЙ ПРОСТІР ЧИСТИЙ";
                desc.innerText = "Активних загроз не виявлено. Дякуємо силам ППО.";
            }
        }

        function createTarget(top, left, label) {
            const mapVisual = document.getElementById('map-visual');
            const targetEl = document.createElement('div');
            targetEl.className = 'map-target';
            targetEl.style.top = top;
            targetEl.style.left = left;
            targetEl.innerHTML = `<div class="target-blip"></div><div class="target-label">${label}</div>`;
            mapVisual.appendChild(targetEl);
        }
    </script>
</body>
</html>
